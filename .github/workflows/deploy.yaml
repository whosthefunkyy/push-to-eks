# Этап 1: только сборка и push в ECR (кластер не нужен).
# Этап 2 (позже): deploy job с EKS_CLUSTER_NAME + helm upgrade.

name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ECR_REGISTRY: 262778473495.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: go-api-image
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Docker build → ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Image URI (for logs)
        run: |
          echo "Pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
