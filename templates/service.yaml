apiVersion: v1
kind: Service
metadata:
  name: srv-api
  namespace: {{ .Values.namespace  }}
  labels:
    {{- include "go-api.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "go-api.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080 
  type: {{ .Values.service.type }}
